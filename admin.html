<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MillieDev Admin Panel</title>

<style>

/* ================= BASE ================= */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0a0f1f;
    color: #fff;
}

/* ================= TOP NAV ================= */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #0f1629;
    position: sticky;
    top: 0;
    z-index: 10;
}

.logo {
    font-weight: bold;
    color: #6C63FF;
}

/* simple dropdown menu (NO FULL SCREEN OVERLAY) */
.menu a {
    color: #aaa;
    margin-left: 15px;
    text-decoration: none;
    font-size: 14px;
}

.menu a:hover {
    color: #fff;
}

/* ================= STATS ================= */
.stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 15px;
}

.card {
    background: #111a2e;
    padding: 14px;
    border-radius: 12px;
}

.card h3 {
    margin: 0;
    color: #6C63FF;
}

/* ================= MAIN GRID ================= */
.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
    padding: 15px;
}

/* ================= PANELS ================= */
.panel {
    background: #111a2e;
    padding: 15px;
    border-radius: 12px;
    min-height: 220px;
}

/* ================= BOOKINGS ================= */
.booking {
    background: #0f1629;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    border-left: 3px solid #6C63FF;
}

.service {
    display: inline-block;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 6px;
    background: rgba(108,99,255,0.2);
    color: #6C63FF;
}

/* ================= BOTTOM SECTION (IMPORTANT FIX) ================= */
.bottom {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 15px;
}

.box {
    background: #111a2e;
    padding: 15px;
    border-radius: 12px;
}

/* ================= MOBILE ================= */
@media (max-width: 900px) {

    .stats {
        grid-template-columns: repeat(2, 1fr);
    }

    .grid {
        grid-template-columns: 1fr;
    }

    .bottom {
        grid-template-columns: 1fr;
    }

    .menu {
        display: none;
    }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

    <div class="logo">MillieDev Admin</div>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Bookings</a>
        <a href="#">Messages</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
    </div>

</div>

<!-- STATS -->
<div class="stats">

    <div class="card">
        <h3>Total Bookings</h3>
        <p>156</p>
    </div>

    <div class="card">
        <h3>New This Week</h3>
        <p>28</p>
    </div>

    <div class="card">
        <h3>Clients</h3>
        <p>102</p>
    </div>

    <div class="card">
        <h3>Conversion</h3>
        <p>68%</p>
    </div>

</div>

<!-- MAIN -->
<div class="grid">

    <div class="panel">
        <h3>Recent Bookings</h3>
        <div id="cards"></div>
    </div>

    <div class="panel">
        <h3>Analytics Overview</h3>
        <p style="opacity:0.6;">Bookings, growth, trends</p>
    </div>

</div>

<!-- BOTTOM SECTION (FIXES EMPTY SPACE ISSUE) -->
<div class="bottom">

    <div class="box">
        <h3>Messages</h3>
        <p style="opacity:0.6;">No new messages</p>
    </div>

    <div class="box">
        <h3>Notifications</h3>
        <p style="opacity:0.6;">System is stable</p>
    </div>

    <div class="box">
        <h3>Quick Actions</h3>
        <p style="opacity:0.6;">Send update / alert users</p>
    </div>

</div>

</body>
</html>

<script>

const API_URL = "https://millie-dav.onrender.com";

async function loadBookings() {

    try {
        const token = localStorage.getItem("token");

        const res = await fetch(`${API_URL}/bookings`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const data = await res.json();

        const container = document.getElementById("cards");
        container.innerHTML = "";

        data.forEach(booking => {

            const div = document.createElement("div");
            div.classList.add("booking");

            div.innerHTML = `
                <h4>${booking.name}</h4>
                <div class="meta">${booking.email}</div>

                <div class="service">${booking.service || "General"}</div>

                <p class="msg">${booking.message}</p>

                <button onclick="deleteBooking('${booking._id}')">Delete</button>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.log("Error loading bookings:", err);
    }
}

async function deleteBooking(id) {

    const token = localStorage.getItem("token");

    try {
        await fetch(`${API_URL}/bookings/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        // instantly remove from UI (no delay feeling)
        loadBookings();

    } catch (err) {
        console.log("Delete error:", err);
    }
}

// auto load when page opens
loadBookings();

</script>
