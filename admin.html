<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MillieDev Admin Dashboard</title>
</head>
<body>

<!-- Hamburger Menu Button -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">MillieDev</div>
    <div class="nav">
        <a href="#">Dashboard</a>
        <a href="#">Bookings</a>
        <a href="#">Services</a>
        <a href="#">Clients</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
    </div>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Topbar -->
    <div class="topbar">
        <h2>Dashboard Overview</h2>
        <input class="search" placeholder="Search bookings...">
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat"><h3>156</h3><p>Total Bookings</p></div>
        <div class="stat"><h3>28</h3><p>New This Week</p></div>
        <div class="stat"><h3>102</h3><p>Clients</p></div>
        <div class="stat"><h3>68%</h3><p>Conversion Rate</p></div>
    </div>

    <!-- Grid -->
    <div class="grid">
        <div class="panel">
            <h3>Recent Bookings</h3>
            <div id="cards"></div>
        </div>
        <div class="panel">
            <h3>Analytics</h3>
            <p style="opacity:0.6;">Charts coming soon</p>
            <h3 style="margin-top:20px;">Top Services</h3>
            <p style="opacity:0.6;">Breakdown coming soon</p>
        </div>
    </div>
</div>

<!-- JavaScript for Mobile Menu -->
<script>
    function toggleMenu() {
        const sidebar = document.querySelector('.sidebar');
        sidebar.classList.toggle('active');
    }
</script>

</body>
</html>
