<script>
async function sendBooking() {
    const btn = document.getElementById("btn");
    const resBox = document.getElementById("response");

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
    };

    btn.innerText = "Sending...";
    btn.disabled = true; // Added to prevent double-clicks

    try {
        // FIXED: Changed from /bookings to /booking to match your API and file naming convention
        const res = await fetch("https://millie-dav.onrender.com/booking", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            resBox.innerText = "Sent successfully!";
            resBox.style.color = "lightgreen";
        } else {
            resBox.innerText = "Failed to send.";
            resBox.style.color = "red";
        }

    } catch (err) {
        resBox.innerText = "Error. Try again.";
        resBox.style.color = "red";
    }

    btn.innerText = "Submit Booking";
    btn.disabled = false;
}
</script>
